            display: flex;
            align-items: center;
            gap: 0.75rem;

        .nav-pill:hover, .nav-pill.active {
            background-color: #E6B325;
            color: #111827;
            border-color: #E6B325;
        }

        .category-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 10px;
            background: #FFFDF5;
            min-width: 450px;
            box-shadow: 0 20px 40px -5px rgba(0,0,0,0.3);

            padding: 24px;

            border: 2px solid #E6B325; 
            pointer-events: auto;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s, transform 0.3s;

        .dark .category-menu {
            background: #111827;
            border-color: #700000; /* Crimson accent in dark mode */
            box-shadow: 0 20px 40px -5px rgba(112,0,0,0.2);

        .group:hover .category-menu {

            text-transform: uppercase;

            overflow: hidden;

          apiKey: "AIzaSyBsoBwmddpu5shrgZQvK7lTTKxwh28BWcg",
          authDomain: "rising-phoenix-db.firebaseapp.com",
          projectId: "rising-phoenix-db",
          storageBucket: "rising-phoenix-db.firebasestorage.app",
          messagingSenderId: "1040016415602",
          appId: "1:1040016415602:web:a5abaa863f2ec20bda9beb"
        };

        if (typeof __firebase_config !== 'undefined') {
             try { Object.assign(firebaseConfig, JSON.parse(__firebase_config)); } catch(e) {}
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'rising-phoenix-newsletter';

        let currentUser = null;
        let dbArticles = [];

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.warn("Authentication failed.", error);
            }
        }
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) setupRealtimeListener();
        });

        function setupRealtimeListener() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'articles');
            onSnapshot(colRef, (snapshot) => {
                dbArticles = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                dbArticles.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                loadArticles(); 
            }, (error) => {
                console.error("Error fetching articles.", error);
            });
        }

        const staticArticles = [
            {
                title: "MOFs: Why This Year’s Chemistry Nobel Prize Is Like Hermione’s Handbag",
                cat: "Science",
                subject: "Chemistry",
                yearGroup: "Year 12",
                img: "https://placehold.co/600x400/111/444?text=Chemistry+Nobel",
                content: "They may not use wizarding spells, but the materials behind this year’s Nobel Prize in Chemistry can be just as astonishing as magic. In 2025, scientists Makoto Fujita, Omar Yaghi, and Susumu Kitagawa were awarded the Nobel Prize for developing Metal - Organic Frameworks, or MOFs which are materials so porous and spacious inside that they’ve been compared to Hermione Granger’s handbag...",
                author: "Elleanore P 12.11",
                date: "Dec 18, 2025",
                isStatic: true
            },
            {
                title: "From Weird to Wired: The Quantum Leap That Won a Nobel",
                cat: "Science",
                subject: "Physics",
                yearGroup: "Year 12",
                img: "https://placehold.co/600x400/222/EEE?text=Quantum+Physics",
                content: "Quantum physics is famously strange. In the quantum world, particles can be in two places at once, pass through barriers they should not, and absorb energy in tiny, fixed amounts. For decades, this weirdness seemed confined...",
                author: "Elleanore P 12.11",
                date: "Dec 18, 2025",
                isStatic: true
            },
            {
                title: "Student Council Leads the Way",
                cat: "News",
                subject: "Community",
                yearGroup: "All",
                img: "https://placehold.co/600x400/5A0C10/EEE?text=Student+Council",
                content: "From charity drives to school improvements, see what the Student Council has been working on this term to make our community a better place for everyone.",
                author: "Editor",
                date: "Nov 02, 2025",
                isStatic: true
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            loadArticles();
            
            document.getElementById('filter-category').addEventListener('change', loadArticles);
            document.getElementById('filter-year').addEventListener('change', loadArticles);

            const handleSearch = (e) => {
                if (e.key === 'Enter') {
                    const query = e.target.value.trim();
                    if(query) performSearch(query);
                    else resetToHome();
                }
            };
            document.getElementById('search-input')?.addEventListener('keydown', handleSearch);
            document.getElementById('nav-search')?.addEventListener('keydown', handleSearch);
        });

        window.toggleDarkMode = function() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        window.openArticle = function(cardElement) {
            const modal = document.getElementById('read-modal');
            const data = cardElement.dataset;
            
            document.getElementById('reader-image').src = data.img;
            const cats = data.cat.split(',');
            document.getElementById('reader-category').innerHTML = cats.join(', ') + (data.subject ? ` / ${data.subject}` : "");
            document.getElementById('reader-year').innerText = data.year;
            document.getElementById('reader-title').innerText = data.title;
            document.getElementById('reader-content').innerHTML = `<p>${data.content.replace(/\n/g, '</p><p>')}</p>`;
            document.getElementById('reader-author').innerText = data.author;
            document.getElementById('reader-date').innerText = data.date;

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        window.closeReader = function() {
            document.getElementById('read-modal').classList.add('hidden');
            document.body.style.overflow = 'auto'; 
        }

        function getAllArticles() {
            return [...dbArticles, ...staticArticles];
        }

        window.resetFilters = function() {
            document.getElementById('search-input').value = "";
            document.getElementById('filter-category').value = "All";
            document.getElementById('filter-year').value = "All";
            loadArticles();
        }

        window.resetToHome = function() {
            closeReader();
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('search-view').classList.add('hidden');
            document.getElementById('search-input').value = "";
            if(document.getElementById('nav-search')) document.getElementById('nav-search').value = ""; 
            loadArticles();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.performSearch = function(query) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('search-view').classList.remove('hidden');
            document.getElementById('search-query-display').innerText = query;

            const resultsGrid = document.getElementById('search-results-grid');
            const allArticles = getAllArticles();
            const lowerQ = query.toLowerCase();

            const matches = allArticles.filter(art => 
                art.title.toLowerCase().includes(lowerQ) || 
                art.content.toLowerCase().includes(lowerQ)
            );

            resultsGrid.innerHTML = '';
            if (matches.length > 0) {
                matches.forEach(article => {
                    resultsGrid.insertAdjacentHTML('beforeend', generateCardHTML(article));
                });
            }
        }

        function generateCardHTML(article) {
            const year = article.yearGroup || "All";
            const subject = article.subject || "";
            const cats = Array.isArray(article.cat) ? article.cat : [article.cat];
            
            return `
            <div class="bg-evo-cream dark:bg-gray-900 rounded-3xl overflow-hidden shadow-lg border border-black/5 dark:border-evo-red/30 hover:-translate-y-2 hover:shadow-2xl dark:hover:border-evo-red transition-all duration-300 flex flex-col h-[450px] cursor-pointer group"
                onclick="openArticle(this)"
                data-title="${article.title}"
                data-cat="${cats.join(',')}"
                data-subject="${subject}"
                data-year="${year}"
                data-img="${article.img}"
                data-content="${article.content}"
                data-author="${article.author}"
                data-date="${article.date}"
            >
                <div class="p-8 flex-1 flex flex-col bg-evo-cream dark:bg-gray-900">
                    <div class="mb-4">
                        <span class="inline-block bg-evo-gold text-dark-text text-[10px] font-black px-3 py-1.5 rounded-md uppercase tracking-widest shadow-sm">${cats.join(', ')}</span>
                    </div>
                    <h3 class="text-xl md:text-2xl font-black text-dark-text dark:text-white mb-3 leading-tight tracking-tight group-hover:text-evo-red dark:group-hover:text-evo-gold transition">
                        ${article.title}
                    </h3>
                    <p class="text-sm text-gray-700 dark:text-gray-300 mb-6 line-clamp-3 leading-relaxed flex-1">${article.content}</p>
                    
                    <div class="mt-auto flex items-center text-xs font-bold uppercase tracking-widest text-dark-text dark:text-white group-hover:text-evo-red dark:group-hover:text-evo-gold transition">
                        Read More <span class="ml-2 transition-transform group-hover:translate-x-1">&rarr;</span>
                    </div>
                </div>
                <img src="${article.img}" class="h-48 w-full object-cover border-t border-black/5 dark:border-evo-red/20 opacity-90 group-hover:opacity-100 transition-opacity">
            </div>
            `;
        }

        window.loadArticles = function() {
            const grid = document.getElementById('articles-grid');
            const heroSection = document.getElementById('this-month');
            const noResults = document.getElementById('no-results');
            
            grid.innerHTML = '';
            heroSection.innerHTML = '';
            
            const allArticles = getAllArticles();
            const catFilter = document.getElementById('filter-category').value;
            const yearFilter = document.getElementById('filter-year').value;

            const filtered = allArticles.filter(art => {
                const artCats = Array.isArray(art.cat) ? art.cat : [art.cat];
                const matchesCat = catFilter === 'All' || artCats.includes(catFilter);
                const matchesYear = yearFilter === 'All' || (art.yearGroup && art.yearGroup === yearFilter);
                return matchesCat && matchesYear;
            });

            if(filtered.length === 0) {
                noResults.classList.remove('hidden');
                document.getElementById('latest').classList.remove('hidden');
                return;
            } else {
                noResults.classList.add('hidden');
            }

            // High impact Layout: Hero component matched perfectly to image_3e34d7.png design
            let featuredArt = null;
            let gridArticles = [];

            if (catFilter === 'All' && yearFilter === 'All' && filtered.length > 0) {
                featuredArt = filtered[0];
                gridArticles = filtered.slice(1);
            } else {
                gridArticles = filtered;
                heroSection.classList.add('hidden');
            }

            if (featuredArt) {
                heroSection.classList.remove('hidden');
                const heroCats = Array.isArray(featuredArt.cat) ? featuredArt.cat : [featuredArt.cat];
                
                heroSection.innerHTML = `
                <div class="flex flex-col md:flex-row w-full bg-evo-cream dark:bg-gray-900 rounded-[2rem] shadow-2xl border border-transparent dark:border-evo-red/30 overflow-hidden cursor-pointer group hover:shadow-evo-red/20 transition-all duration-500"
                     onclick="openArticle(this)"
                     data-title="${featuredArt.title}"
                     data-cat="${heroCats.join(',')}"
                     data-subject="${featuredArt.subject || ""}"
                     data-year="${featuredArt.yearGroup || "All"}"
                     data-img="${featuredArt.img}"
                     data-content="${featuredArt.content}"
                     data-author="${featuredArt.author}"
                     data-date="${featuredArt.date}">
                    
                    <div class="w-full md:w-1/2 lg:w-[45%] p-10 md:p-14 lg:p-16 flex flex-col justify-center order-2 md:order-1 relative z-10 bg-evo-cream dark:bg-gray-900">
                        <span class="bg-evo-gold text-dark-text text-[11px] font-black px-4 py-1.5 rounded-md w-max mb-6 uppercase tracking-widest shadow-sm">Featured</span>
                        
                        <h2 class="text-4xl md:text-5xl lg:text-[3.5rem] font-black text-dark-text dark:text-white mb-6 leading-[1.05] tracking-tight group-hover:text-evo-red dark:group-hover:text-evo-gold transition-colors">
                            ${featuredArt.title}
                        </h2>
                        
                        <p class="text-gray-700 dark:text-gray-300 mb-10 text-base md:text-lg line-clamp-4 leading-relaxed font-medium">
                            ${featuredArt.content}
                        </p>
                        
                        <div class="mt-auto inline-flex items-center group/btn border border-black/30 dark:border-evo-red/50 rounded-full px-6 py-3 w-max hover:bg-dark-text hover:border-dark-text dark:hover:bg-evo-red dark:hover:border-evo-red transition-all">
                            <span class="text-xs font-bold text-dark-text dark:text-white uppercase tracking-widest mr-3 group-hover/btn:text-white">Read More</span>
                            <svg class="w-4 h-4 text-dark-text dark:text-white group-hover/btn:text-white transition transform group-hover/btn:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </div>
                    
                    <div class="w-full md:w-1/2 lg:w-[55%] h-[350px] md:h-auto relative bg-[#111] order-1 md:order-2 border-l border-black/5 dark:border-evo-red/20 overflow-hidden">
                        <img src="${featuredArt.img}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-90 group-hover:opacity-100">
                    </div>
                </div>
                `;
            }

            if (gridArticles.length > 0) {
                document.getElementById('latest').classList.remove('hidden');
                gridArticles.forEach(article => {
                    grid.insertAdjacentHTML('beforeend', generateCardHTML(article));
                });
            } else if (!featuredArt) {
                 document.getElementById('latest').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
